version: "3.9"

services:
  db:
    image: postgres:16
    container_name: polymarket-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: polymarket
      POSTGRES_PASSWORD: polymarket_pw
      POSTGRES_DB: polymarket
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data